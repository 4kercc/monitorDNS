<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>monitorDNS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/app.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">monitorDNS</a>
      <div class="d-flex align-items-center text-white-50">
        <span class="me-3">当前用户：{{.User.Username}}</span>
        <form method="post" action="/logout" class="m-0">
          <button class="btn btn-sm btn-outline-light" type="submit">退出</button>
        </form>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="row g-4">
      <div class="col-lg-5">
        <div class="card">
          <div class="card-header">添加监控</div>
          <div class="card-body">
            <form method="post" action="/domains" class="vstack gap-3">
              <div>
                <label class="form-label">域名</label>
                <input class="form-control" name="domain" placeholder="例如：www.baidu.com" required>
              </div>
              <div>
                <label class="form-label">备注</label>
                <input class="form-control" name="remark" placeholder="可选，用于说明用途（例如：海外节点监控）">
              </div>
              <div class="row g-2">
                <div class="col-6">
                  <label class="form-label">记录类型</label>
                  <select class="form-select" name="record_type">
                    <option value="A">A</option>
                    <option value="CNAME">CNAME</option>
                  </select>
                </div>
                <div class="col-6">
                  <label class="form-label">检测周期</label>
                  <select class="form-select" name="interval">
                    <option value="30">30s</option>
                    <option value="60" selected>1m</option>
                    <option value="300">5m</option>
                  </select>
                </div>
              </div>
              <button class="btn btn-primary" type="submit">保存</button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="card">
          <div class="card-header">监控列表</div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-striped table-hover mb-0 align-middle">
                <thead>
                  <tr>
                    <th>域名</th>
                    <th>类型</th>
                    <th>周期</th>
                    <th>备注</th>
                    <th>状态</th>
                    <th class="text-end">操作</th>
                  </tr>
                </thead>
                <tbody>
                {{range .Domains}}
                  <tr>
                    <td>
                      <a href="/domains/{{.ID}}" class="text-decoration-none">{{.Domain}}</a>
                    </td>
                    <td><span class="badge text-bg-secondary">{{.RecordType}}</span></td>
                    <td>{{.IntervalSeconds}}s</td>
                    <td class="text-muted">{{.Remark}}</td>
                    <td>
                      {{if .Enabled}}
                        <span class="badge text-bg-success">运行中</span>
                      {{else}}
                        <span class="badge text-bg-secondary">已暂停</span>
                      {{end}}
                    </td>
                    <td class="text-end">
                      <form method="post" action="/domains/{{.ID}}/toggle" class="d-inline">
                        <button class="btn btn-sm btn-outline-primary" type="submit">
                          {{if .Enabled}}暂停{{else}}启动{{end}}
                        </button>
                      </form>
                      <form method="post" action="/domains/{{.ID}}/delete" class="d-inline" onsubmit="return confirm('确定删除该监控？');">
                        <button class="btn btn-sm btn-outline-danger" type="submit">删除</button>
                      </form>
                    </td>
                  </tr>
                {{end}}
                {{if eq (len .Domains) 0}}
                  <tr><td colspan="6" class="text-center text-muted py-4">暂无监控</td></tr>
                {{end}}
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="text-muted small mt-3">
          说明：新增/修改会在 15 秒内自动生效；监控结果写入 SQLite（默认 <code>monitorDNS.db</code>）。
        </div>
      </div>
    </div>
  </div>
</body>
</html>
